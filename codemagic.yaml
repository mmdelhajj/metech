workflows:
  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.41.6
      java: 21
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
      - name: Build App Bundle
        script: flutter build appbundle --release
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
    publishing:
      email:
        recipients:
          - mmdelhajj@gmail.com

  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: MeTech App Store
    environment:
      groups:
        - ios_credentials
      flutter: 3.41.6
      xcode: latest
      cocoapods: default
    scripts:
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files com.metech.store             --type IOS_APP_STORE             --create             --certificate-key=@env:CERTIFICATE_PRIVATE_KEY
      - name: Use profiles
        script: xcode-project use-profiles
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: cd ios && pod install
      - name: Build IPA
        script: |
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
      - name: Find IPA
        script: |
          find . -name '*.ipa' 2>/dev/null
          find /Users/builder -name '*.ipa' 2>/dev/null || true
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - mmdelhajj@gmail.com
